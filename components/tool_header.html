<!-- Auth & Navigation Header -->
<header class="bg-surface-dark border-b border-white/10 sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="goToDashboard()"
                class="flex items-center gap-2 px-4 py-2 hover:bg-white/5 rounded-lg transition-colors text-text-muted-dark hover:text-text-dark">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Back to Dashboard</span>
            </button>
            <div class="h-6 w-px bg-white/10"></div>
            <h1 class="text-xl font-bold text-text-dark">Security Suite</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="userInfo" class="text-sm text-text-muted-dark font-medium"></span>
            <button onclick="logout()"
                class="flex items-center gap-2 px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors text-sm font-medium">
                <span class="material-symbols-outlined text-base">logout</span>
                Logout
            </button>
        </div>
    </div>
</header>
